# =============================================================================
# CI Pipeline — Trainings Monorepo
# =============================================================================
# Runs on every push to main and on pull requests targeting main.
# Steps: install -> type-check -> lint -> test -> build
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Environment variables required by the Next.js build.
# In CI we use harmless placeholders so the build can complete without
# real secrets. Production deploys inject the real values separately.
# ---------------------------------------------------------------------------
env:
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
  CLERK_SECRET_KEY: "sk_test_placeholder"
  NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  # Skip runtime env validation during CI builds
  SKIP_ENV_VALIDATION: "true"

jobs:
  ci:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the repository
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup pnpm (version derived from packageManager in package.json)
      # -----------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      # -----------------------------------------------------------------------
      # 3. Setup Node.js 20 with pnpm dependency cache
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      # -----------------------------------------------------------------------
      # 4. Install dependencies (strict lockfile — no mutations)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # -----------------------------------------------------------------------
      # 5. Type-check — runs `turbo run type-check` across all packages
      # -----------------------------------------------------------------------
      - name: Type-check
        run: pnpm type-check

      # -----------------------------------------------------------------------
      # 6. Lint — runs `turbo run lint` across all packages
      # -----------------------------------------------------------------------
      - name: Lint
        run: pnpm lint

      # -----------------------------------------------------------------------
      # 7. Test — runs `turbo run test` (gracefully skips if no tests exist)
      # -----------------------------------------------------------------------
      - name: Run tests
        run: pnpm test || echo "No tests configured yet"

      # -----------------------------------------------------------------------
      # 8. Build — full production build to catch build-time errors
      # -----------------------------------------------------------------------
      - name: Build
        run: pnpm build
