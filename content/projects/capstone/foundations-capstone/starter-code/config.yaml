# =============================================================================
# Server Monitoring System — Configuration
# =============================================================================
# This file controls the behavior of the monitoring system. Edit the values
# below to match your environment and alerting preferences.
# =============================================================================

# ---------------------------------------------------------------------------
# Monitoring Settings
# ---------------------------------------------------------------------------
# interval: How often (in seconds) to collect metrics in dashboard mode.
# metrics: Which system metrics to collect.
monitoring:
  interval: 60
  metrics:
    - cpu
    - memory
    - disk
    - network

# ---------------------------------------------------------------------------
# Alert Thresholds
# ---------------------------------------------------------------------------
# When a metric exceeds its threshold, an alert is triggered.
# Values are percentages (0-100).
#
# Alert severity is determined as follows:
#   - CRITICAL: value >= threshold
#   - WARNING:  value >= threshold * 0.9
thresholds:
  cpu_percent: 80
  memory_percent: 85
  disk_percent: 90

# ---------------------------------------------------------------------------
# Alert Configuration
# ---------------------------------------------------------------------------
# webhook_url: Slack-compatible incoming webhook URL for sending alerts.
#              Replace with your actual webhook URL.
# channels: Which alert channels to use. Options: console, webhook
# cooldown_minutes: Minimum minutes between repeated alerts for the same metric.
alerts:
  webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  channels:
    - console
    - webhook
  cooldown_minutes: 5

# ---------------------------------------------------------------------------
# HTTP Endpoint Monitoring
# ---------------------------------------------------------------------------
# List of HTTP endpoints to monitor for availability and response time.
# Each endpoint requires:
#   - url: Full URL to check (HTTP GET request)
#   - name: Human-readable label for display and alerts
#   - timeout: Request timeout in seconds
#   - expected_status: Expected HTTP status code (default: 200)
endpoints:
  - url: "http://localhost:8080/health"
    name: "Web App"
    timeout: 5
    expected_status: 200

  - url: "http://localhost:3000"
    name: "Dashboard Service"
    timeout: 5
    expected_status: 200

# ---------------------------------------------------------------------------
# DNS Resolution Monitoring
# ---------------------------------------------------------------------------
# List of hostnames to resolve. Alerts trigger on resolution failure.
dns_checks:
  - "google.com"
  - "github.com"

# ---------------------------------------------------------------------------
# Port Availability Monitoring
# ---------------------------------------------------------------------------
# List of host:port pairs to check via TCP connection.
# Each entry requires:
#   - host: Hostname or IP address
#   - port: TCP port number
#   - name: Human-readable label
#   - timeout: Connection timeout in seconds
ports:
  - host: "localhost"
    port: 6379
    name: "Redis"
    timeout: 3

  - host: "localhost"
    port: 5432
    name: "PostgreSQL"
    timeout: 3

# ---------------------------------------------------------------------------
# Response Time Thresholds
# ---------------------------------------------------------------------------
# Alert when response times exceed these values (in milliseconds).
response_time:
  warning_ms: 500
  critical_ms: 2000

# ---------------------------------------------------------------------------
# Reporting
# ---------------------------------------------------------------------------
# output_dir: Directory where reports are saved (relative to project root).
# formats: Report output formats to generate.
reporting:
  output_dir: "reports"
  formats:
    - terminal
    - html
