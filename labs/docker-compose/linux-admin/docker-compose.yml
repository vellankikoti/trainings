version: "3.8"

services:
  lab:
    image: ubuntu:22.04
    container_name: devops-linux-admin-lab
    stdin_open: true
    tty: true
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq procps htop tree vim curl net-tools iproute2 sysstat cron logrotate sudo lsof >/dev/null 2>&1 &&
        echo 'Lab environment ready.' &&
        /bin/bash
      "
    volumes:
      - admin-lab-data:/root
    environment:
      - TERM=xterm-256color
    cap_add:
      - SYS_PTRACE

volumes:
  admin-lab-data:
